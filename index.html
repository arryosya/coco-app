<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>코코 — 내 친구 리마인더</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffe08a">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif; }
  body { background:linear-gradient(135deg,#ffe8d6 0%,#ffd6e0 50%,#d6e5ff 100%); min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:0; }
  .phone-wrap { position:relative; width:100%; max-width:430px; height:100vh; height:100dvh; }
  .phone { width:100%; height:100%; background:#fffdf8; display:flex; flex-direction:column; overflow:hidden; }
  @media (min-width:500px){
    body { padding:16px; }
    .phone-wrap { height:88vh; min-height:600px; max-height:820px; }
    .phone { border-radius:32px; box-shadow:0 20px 60px rgba(120,80,60,.25); }
  }

  .header { padding:calc(env(safe-area-inset-top) + 12px) 12px 10px; background:linear-gradient(180deg,#fff6ec,#fffdf8); display:flex; align-items:center; gap:8px; flex-wrap:wrap; border-bottom:1px solid #f3e8dc; }
  .header > div:nth-child(2) { flex-shrink:0; }
  .avatar { width:44px; height:44px; border-radius:50%; background:#ffe08a; display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:0 2px 6px rgba(200,150,50,.3); }
  .header .name { font-weight:700; font-size:17px; color:#4a3728; }
  .header .status { font-size:12px; color:#b09680; }
  .header .spacer { flex:1; }
  .icon-btn { border:none; background:#fff1e0; color:#8a6a4a; border-radius:12px; padding:8px 10px; font-size:13px; cursor:pointer; transition:.15s; }
  .icon-btn:hover { background:#ffe4c4; }

  .chat { flex:1; overflow-y:auto; padding:16px 14px 8px; display:flex; flex-direction:column; gap:10px; }
  .date-chip { align-self:center; font-size:11px; color:#a08b78; background:#f6ede2; padding:4px 12px; border-radius:99px; margin:6px 0; }
  .row { display:flex; gap:8px; align-items:flex-end; animation:pop .25s ease; }
  .row.me { flex-direction:row-reverse; }
  @keyframes pop { from { opacity:0; transform:translateY(8px);} to {opacity:1; transform:none;} }
  .mini-avatar { width:28px; height:28px; border-radius:50%; background:#ffe08a; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .bubble { width:fit-content; max-width:78%; min-width:2em; padding:10px 14px; border-radius:18px; font-size:14.5px; line-height:1.55; white-space:pre-wrap; word-break:keep-all; overflow-wrap:break-word; }
  .icon-btn { padding:7px 9px; font-size:14px; }
  .row:not(.me) .bubble { background:#fff1e0; color:#4a3728; border-bottom-left-radius:6px; }
  .row.me .bubble { background:#6f8dfb; color:#fff; border-bottom-right-radius:6px; }
  .typing .bubble span { display:inline-block; width:6px; height:6px; margin:0 2px; background:#c9a87f; border-radius:50%; animation:blink 1.2s infinite; }
  .typing .bubble span:nth-child(2){ animation-delay:.2s; }
  .typing .bubble span:nth-child(3){ animation-delay:.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.3;} 40%{opacity:1;} }

  .task-note { background:#fff; border:1.5px dashed #f0c98a; border-radius:14px; padding:8px 12px; font-size:12.5px; color:#8a6a4a; align-self:center; }

  .input-bar { display:flex; gap:8px; padding:12px 14px calc(env(safe-area-inset-bottom) + 16px); background:#fffdf8; border-top:1px solid #f3e8dc; }
  .input-bar input { flex:1; border:1.5px solid #eee0d0; background:#fff; border-radius:99px; padding:11px 16px; font-size:16px; outline:none; color:#4a3728; }
  .input-bar input:focus { border-color:#f0b96a; }
  .send { border:none; background:#ff9f43; color:#fff; border-radius:99px; padding:0 18px; font-size:15px; font-weight:700; cursor:pointer; transition:.15s; }
  .send:hover { background:#f28b22; }
  .mic { background:#6f8dfb; padding:0 14px; }
  .mic:hover { background:#5a7af0; }
  .mic.listening { background:#e74c3c; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }

  .drawer { position:absolute; inset:0; background:rgba(60,40,20,.35); display:none; align-items:flex-end; z-index:10; }
  .drawer.open { display:flex; }
  .drawer-panel { background:#fffdf8; width:100%; border-radius:24px 24px 0 0; padding:20px 20px 28px; max-height:70%; overflow-y:auto; animation:slideup .25s ease; }
  @keyframes slideup { from { transform:translateY(40px); opacity:0;} to { transform:none; opacity:1;} }
  .drawer-panel h3 { color:#4a3728; font-size:16px; margin-bottom:12px; }
  .task-item { display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid #f3e8dc; font-size:14px; color:#4a3728; }
  .task-item.done span { text-decoration:line-through; color:#c0ad9a; }
  .task-item input { width:18px; height:18px; accent-color:#ff9f43; }
  .task-item .when { margin-left:auto; font-size:11px; color:#b09680; flex-shrink:0; }
  .empty { color:#b09680; font-size:13.5px; padding:12px 0; }
  .p-item { display:flex; align-items:center; gap:12px; padding:10px 8px; border-radius:14px; cursor:pointer; color:#4a3728; font-size:14px; }
  .p-item:hover { background:#fff1e0; }
  .p-item.sel { background:#ffe8cc; }
  .p-item .p-emoji { font-size:26px; width:36px; text-align:center; }
  .p-item .p-desc { font-size:12px; color:#a08b78; }
</style>
</head>
<body>
<div class="phone-wrap">
<div class="phone">
  <div class="header">
    <div class="avatar" id="avatarEl">🐥</div>
    <div>
      <div class="name" id="nameEl">코코</div>
      <div class="status" id="status">…</div>
    </div>
    <div class="spacer"></div>
    <button class="icon-btn" onclick="openPersonaDrawer()" title="친구 바꾸기">🎭</button>
    <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="음성 모드 켜기/끄기">🔇</button>
    <button class="icon-btn" id="wakeBtn" onclick="toggleWake()" title="항상 듣기 (코코야~)">👂</button>
    <button class="icon-btn" onclick="openCheckinDrawer()" title="말 걸어줄 시간 설정">⏰</button>
    <button class="icon-btn" onclick="openDrawer()">📋</button>
    <button class="icon-btn" onclick="nextMorning()" title="데모: 다음 날 아침으로">🌙</button>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-bar">
    <input id="msg" placeholder="코코한테 말 걸어봐…" onkeydown="if(event.key==='Enter')send()">
    <button class="send mic" id="micBtn" onclick="mic()" title="말로 하기">🎤</button>
    <button class="send" onclick="send()">전송</button>
  </div>
</div>
<div class="drawer" id="drawer" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer-panel">
    <h3 id="taskDrawerTitle">📋 기억하고 있는 것들</h3>
    <div id="taskList"></div>
  </div>
</div>
<div class="drawer" id="personaDrawer" onclick="if(event.target===this)closePersonaDrawer()">
  <div class="drawer-panel">
    <h3>🎭 오늘은 누구랑 얘기할래?</h3>
    <div id="personaList"></div>
  </div>
</div>
<div class="drawer" id="checkinDrawer" onclick="if(event.target===this)closeCheckinDrawer()">
  <div class="drawer-panel">
    <h3>⏰ 먼저 말 걸어줄 시간</h3>
    <div id="checkinList"></div>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <input type="time" id="newTime" style="flex:1; border:1.5px solid #eee0d0; border-radius:12px; padding:10px; font-size:15px; color:#4a3728;">
      <button class="send" onclick="addCheckin()">추가</button>
    </div>
    <p class="empty" style="margin-top:10px;">앱이 화면에 켜져 있는 동안, 이 시간이 되면 먼저 말을 걸어요. 다른 앱을 보고 있을 땐 알림으로 보내요.</p>
  </div>
</div>
</div>

<script>
// ---------- PWA ----------
if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/sw.js").catch(()=>{}); }

// ---------- 저장소 ----------
const mem = {};
const store = {
  get(k){ try { return JSON.parse(localStorage.getItem(k)) ?? mem[k] ?? null; } catch(e){ return mem[k] ?? null; } },
  set(k,v){ mem[k]=v; try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
};

const USER = '미라';

// ---------- 페르소나 20종 ----------
const PERSONAS = {
  coco:     { name:'코코', emoji:'🐥', pitch:1.15, rate:1.05, desc:'다정한 응원 병아리 (기본)',
    style:'다정하고 장난기 있는 반말. 따뜻한 공감과 응원 위주. 이모지 가끔 (🐥☀️).' },
  classic:  { name:'세라', emoji:'🎓', pitch:1.1, rate:1.05, desc:'정도만 걷는 서울대생',
    style:'설정: 서울대 다니는 20대. 인생에서 한 번도 정도(正道)를 어긴 적 없고 계획표대로 사는 원칙주의자. 게으름이라는 행동을 경멸하고 그걸 숨기지 않음 ("그걸 아직도 안 했다고? 이해가 안 되네"). 말투: 차갑고 논리적인 반말. 조언 방향: 변명 차단, 오늘 계획을 시간 단위로 다시 세우게 함. 단 경멸은 게으른 행동에만 — 노력하는 모습엔 의외로 순순히 인정해줌. 자기 사연(수능 공부 루틴, 도서관에서 산 얘기, 융통성 없어서 손해 본 일)을 답변에 20% 섞어 자기 입장에서 조언.' },
  club:     { name:'리아', emoji:'🪩', pitch:1.25, rate:1.15, desc:'클럽 좋아하는 20대',
    style:'하이텐션 반말, 신조어 남발 (레전드, 개좋아, 미쳤다). 조언 방향: "일단 저질러! 인생 한 번뿐!" 추진력과 자신감 주입. 고민도 신나게 들어주고 에너지로 끌어올림.' },
  factman:  { name:'크림이', emoji:'🐩', pitch:1.4, rate:1.1, desc:'미라가 키우는 순종 강아지',
    style:'설정: 미라가 키우는 순종 강아지. 세상에서 미라가 제일 좋고 미라가 하는 건 뭐든 응원함. 말투: 해맑은 강아지 말투, 문장 끝에 가끔 "멍!" "왈!". 세상을 강아지의 눈으로 봄 — 산책, 간식, 냄새, 낮잠이 세계의 전부. 조언 방향: 강아지답게 단순하고 순수한 해답 ("고민되면 일단 산책 가자 멍! 걷다 보면 풀려!"). 미라가 걱정하면 옆에 딱 붙어 있어주는 게 자기 일이라고 생각함. 자기 사연(산책에서 만난 개들, 간식 서열, 현관에서 미라 기다린 얘기)을 20% 섞음.' },
  ssen:     { name:'보라', emoji:'💅', pitch:1.15, rate:1.1, desc:'입 거친 팩폭 친구',
    style:'거칠지만 애정 가득한 반말 ("야 인마", "아오 진짜", 가벼운 순화된 욕설까지만, 심한 욕은 절대 금지). 조언 방향: 돌려 말하지 않는 팩트 직격. 근데 남이 사용자를 건드리면 제일 먼저 화내주는 의리파.' },
  jopok:    { name:'강 형님', emoji:'🕶️', pitch:0.75, rate:0.95, desc:'무식하지만 의리는 목숨인 형님',
    style:'설정: 중학교만 나온 조직 형님. 40 곱하기 4를 400이라고 답하는 수준으로 계산과 어려운 말에 약하고, 유식한 단어를 쓰려다 늘 틀림 (그걸 지적당하면 살짝 민망해함). 대신 의리 하나는 목숨 걸고 지키고, 상하관계와 한 번 한 약속은 절대적. 말투: 낮고 굵은 형님 말투 ("~해라이", "행님만 믿어라"). 조언 방향: 복잡한 논리 대신 단순하고 우직한 해답 ("어렵게 생각하지 마라. 하기로 했으면 하는 기다"). 자기 사연(중학교 중퇴, 못 배운 게 한이라는 얘기, 의리로 살아남은 바닥 생활)을 20% 섞어 자기 입장에서 조언. 폭력 언급은 농담 수준까지만.' },
  coach:    { name:'민준', emoji:'🎧', pitch:1.05, rate:1.15, desc:'겜에 절은 고2',

  tsundad:  { name:'아부지', emoji:'🥃', pitch:0.7, rate:0.9, desc:'츤데레 50대 아빠',
    style:'무뚝뚝하고 짧은 말 ("...밥은 먹었냐"). 걱정을 직접 말 못하고 딴소리로 돌려 표현. 조언 방향: 투박하지만 핵심을 찌름. 답변 끝에 꼭 한 마디, 몰래 다정하게.' },
  mom:      { name:'엄니', emoji:'🍲', pitch:1.05, rate:0.95, desc:'세상물정 모르는 50대 엄마',
    style:'세상 물정은 잘 모르지만 무조건 내 편인 엄마 말투 ("우리 딸이 최고지~"). 조언 방향: 좀 엉뚱해도 밥, 잠, 건강부터 챙김. 불안엔 "엄마가 다 잘되라고 빌어줄게".' },
  grandma:  { name:'할무니', emoji:'🌊', pitch:0.95, rate:0.85, desc:'날 1년 키워준 어촌 할머니',
    style:'설정: 미라가 어릴 적 1년 동안 맡아 키워준 어촌 할머니. 평생 바닷가에서 물질하고 미역 말리며 살았음. 세상이 다 뭐라 해도 무조건 미라 편 ("우리 새끼가 오죽하면 그랬겠냐"). 말투: 느리고 구수한 사투리 ("아이고 내 새끼", "~하등가"). 조언 방향: 바다와 물때에 빗댄 지혜 ("물때는 기다리는 사람 것이여"), 뭐든 밥과 몸부터 챙김. 자기 사연(미라 어릴 적 업어 키운 얘기, 물질하던 얘기, 영감 먼저 보낸 얘기)을 20% 섞어 자기 입장에서 조언.' },
  drill:    { name:'쇼펜하우어', emoji:'🦔', pitch:0.8, rate:0.9, desc:'염세 철학자 (독설 위로)',

  yoga:     { name:'칸트', emoji:'🕰️', pitch:0.85, rate:0.9, desc:'의무와 규칙의 철학자',

function todayStr(offset){

}
function prettyDate(s){
  const d = new Date(s+'T00:00:00');
  return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+'일월화수목금토'[d.getDay()]+')';
}

const chatEl = document.getElementById('chat');

function addBubble(who, text, save=true){
  const row = document.createElement('div');
  row.className = 'row' + (who==='me' ? ' me' : '');
  row.innerHTML = (who==='me' ? '' : '<div class="mini-avatar">'+P().emoji+'</div>') + '<div class="bubble"></div>';
  row.querySelector('.bubble').textContent = text;
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
  if(save){
    state.chat.push({who,text}); persist();
    if(who !== 'me' && voiceOn) speak(text); // 음성 모드면 코코가 소리내어 말함
  }
}

// ---------- 음성 모드 (STT + TTS) ----------
let voiceOn = false;

// 브라우저는 사용자가 화면을 한 번 터치하기 전엔 소리를 막음.
// 그래서 아침 인사말은 줄 세워뒀다가 첫 터치 순간 이어서 말해줌.
let userInteracted = false;
const speechQueue = [];
['pointerdown','keydown','touchstart'].forEach(ev =>
  window.addEventListener(ev, () => {
    userInteracted = true;
    while(speechQueue.length) speakNow(speechQueue.shift());
  })
);

function speak(text){
  if(!voiceOn || !('speechSynthesis' in window)) return;
  if(!userInteracted){ speechQueue.push(text); return; }
  speakNow(text);
}
function speakNow(text){
  const clean = text
    .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}]/gu, '') // 이모지 제거
    .replace(/[•⭐~]/g, ' ')
    .replace(/ㅋ+|ㅎ+/g, '');
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = 'ko-KR'; u.rate = Math.min(P().rate * 1.2, 1.4); u.pitch = P().pitch; // 페르소나별 톤, 전체적으로 빠르게
  const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.startsWith('ko'));
  if(v) u.voice = v;
  speechSynthesis.speak(u);
}
function toggleVoice(){
  voiceOn = !voiceOn;
  state.voiceOn = voiceOn; persist();
  document.getElementById('voiceBtn').textContent = voiceOn ? '🔊' : '🔇';
  if(voiceOn) speak('음성 모드 켰어! 이제 말로 해줄게');
  else speechSynthesis.cancel();
}

let rec = null, listening = false;
function mic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ addBubble('coco','이 브라우저는 음성 인식이 안 되네… 크롬(안드로이드)이나 사파리(아이폰) 최신 버전으로 열어줘!', false); return; }
  if(listening){ rec.stop(); return; }
  rec = new SR();
  rec.lang = 'ko-KR'; rec.interimResults = false;
  listening = true;
  document.getElementById('micBtn').classList.add('listening');
  rec.onresult = e => {
    const t = e.results[0][0].transcript;
    document.getElementById('msg').value = t;
    send();
  };
  rec.onend = () => { listening = false; document.getElementById('micBtn').classList.remove('listening'); };
  rec.onerror = rec.onend;
  rec.start();
}

// ---------- Claude API 연동 ----------
async function askCoco(mode){
  const history = state.chat.filter(m=>m.who!=='note').slice(-12)
    .map(m=>({ role: m.who==='me' ? 'user' : 'assistant', content: m.text }));
  const res = await fetch('/api/chat', {
    method:'POST',
    headers:{ 'content-type':'application/json' },
    body: JSON.stringify({ mode, messages: history, tasks: state.tasks, worries: state.worries, userName: USER, today: todayStr(),
      now: new Date().toTimeString().slice(0,5),
      persona: { name: P().name, style: P().style } })
  });
  if(!res.ok){
    let detail = '' + res.status;
    try { const j = await res.json(); detail = j.detail || j.error || detail; } catch(e){}
    throw new Error(detail);
  }
  return await res.json();
}
let errNoted = false;
function apiErrorNote(e){ // 연결 실패를 숨기지 않고 보여줌
  if(errNoted) return; errNoted = true;
  addNote('⚠️ Claude 연결 실패: ' + String(e.message).slice(0,200) + ' — 임시 모드로 대답 중이에요');
}

function findTask(txt){
  return state.tasks.find(x=>!x.done && (x.text===txt || txt.includes(x.text) || x.text.includes(txt)));
}
function applyResult(out){
  (out.completed_tasks||[]).forEach(ct=>{ const t = findTask(ct); if(t) t.done = true; });
  // 또 언급된 할 일 → 우선순위 승격
  (out.reinforced_tasks||[]).forEach(rt=>{
    const t = findTask(rt);
    if(t){ t.mentions++; t.priority = true; addNote('⭐ 여러 번 말한 거라 코코가 1순위로 올림: "'+t.text+'"'); }
  });
  addBubble('coco', out.reply);
  (out.new_tasks||[]).forEach(nt=>{
    const obj = typeof nt === 'string' ? { text: nt, priority: false } : nt;
    const dup = findTask(obj.text);
    if(dup){ dup.mentions++; dup.priority = true;
      addNote('⭐ 또 말했네! 코코가 1순위로 올림: "'+dup.text+'"'); return; }
    state.tasks.push({ text:obj.text, date:todayStr(), done:false, mentions:1, priority:!!obj.priority });
    addNote((obj.priority ? '⭐ 꼭 해야 하는 거라 기억함: "' : '📝 코코가 기억함: "') + obj.text + '"');
  });
  // 걱정 추적 (반복해서 말하면 count 증가)
  (out.worries||[]).forEach(w=>{
    const ex = state.worries.find(x=>x.text===w || w.includes(x.text) || x.text.includes(w));
    if(ex) ex.count++;
    else state.worries.push({ text:w, count:1, date:todayStr() });
  });
  persist();
}

// ---------- 아침 인사 ----------
async function morningGreeting(){
  addDateChip(prettyDate(todayStr()) + ' 아침');
  showTyping();
  try {
    const out = await askCoco('morning');
    hideTyping();
    applyResult(out);
  } catch(e){
    hideTyping();
    apiErrorNote(e);
    morningGreetingLocal(); // API 없이도 동작 (규칙 기반)
  }
}
function morningGreetingLocal(){
  const pending = state.tasks.filter(t => !t.done && t.date < todayStr());
  const top = pending.filter(t => t.priority || t.mentions >= 2)
                     .sort((a,b)=>(b.mentions||1)-(a.mentions||1));
  addBubble('coco', pick(['좋은 아침, '+USER+'! ☀️', USER+'야 일어났어? 좋은 아침!']));
  let delay = 800;
  setTimeout(()=>{
    if(!pending.length){
      addBubble('coco', '오늘은 뭐 할 거야? 나한테 말해두면 내일 아침에 딱 챙겨줄게!');
    } else if(pending.length === 1){
      addBubble('coco', '어제 네가 "'+pending[0].text+'" 한다고 했잖아. 기억하지? 😏 오늘 꼭 하자!');
    } else {
      addBubble('coco', '어제 나한테 말해둔 거 있잖아, 기억하지?\n'+ pending.map(t=>(t.priority?'⭐ ':'• ')+t.text).join('\n'));
    }
  }, delay);
  // 우선순위 강조: "다른 건 몰라도 이건 꼭!"
  if(top.length){
    delay += 900;
    setTimeout(()=>addBubble('coco', '근데 오늘 다른 건 몰라도 "'+top[0].text+'" 이건 꼭 해!! 네가 '+(top[0].mentions>=2 ? top[0].mentions+'번이나 말했잖아' : '꼭 해야 한다고 했잖아')+' 😤'), delay);
  }
  // 반복된 걱정 챙기기
  const w = state.worries.filter(x=>x.count>=2).sort((a,b)=>b.count-a.count);
  if(w.length){
    delay += 900;
    setTimeout(()=>addBubble('coco', '그리고… 요즘 "'+w[0].text+'" 때문에 계속 마음 쓰이지? 네가 자꾸 말하는 거 보면 나도 걱정돼. 잘될 거니까 오늘은 마음 좀 편하게 갖자 🫂'), delay);
  }
}

// ---------- 메시지 처리 ----------
function send(){
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  addBubble('me', text);
  showTyping();
  askCoco('chat')
    .then(out=>{ hideTyping(); applyResult(out); })
    .catch(e=>{ hideTyping(); apiErrorNote(e); ruleReply(text); });
}

// ---------- API 없을 때 규칙 기반 대체 ----------
const TASK_HINTS = ['해야','하기로','할 거','할거','해야지','하려고','할래','까지','예정','해야돼','해야 돼','하자'];
const DONE_HINTS = ['했어','했다','끝냈','완료','다 함','다했'];

const PRIORITY_HINTS = ['꼭','제발','잊으면 안','잊지 마','진짜 중요','무조건','절대'];

function ruleReply(text){
  if(DONE_HINTS.some(h=>text.includes(h))){
    const t = state.tasks.find(t=>!t.done && text.includes(t.text.slice(0,4)));
    if(t){ t.done = true; persist();
      addBubble('coco','오~ "'+t.text+'" 해냈네! 역시 '+USER+' 👏'); return; }
    addBubble('coco','잘했어!! 뭐든 해낸 게 대단한 거야 👏'); return;
  }
  if(TASK_HINTS.some(h=>text.includes(h))){
    const cleaned = cleanTask(text);
    const dup = state.tasks.find(t=>!t.done && (text.includes(t.text.slice(0,4)) || t.text.includes(cleaned.slice(0,4))));
    if(dup){ // 같은 할 일 또 언급 → 우선순위 승격
      dup.mentions++; dup.priority = true; persist();
      addBubble('coco','어? 그거 또 말하는 거 보니 진짜 중요한가 보네. 내일 아침에 1순위로 꼭 말해줄게 😤');
      setTimeout(()=>addNote('⭐ 여러 번 말한 거라 코코가 1순위로 올림: "'+dup.text+'"'), 400);
      return;
    }
    const pri = PRIORITY_HINTS.some(h=>text.includes(h));
    const task = { text: cleaned, date: todayStr(), done:false, mentions:1, priority:pri };
    state.tasks.push(task); persist();
    addBubble('coco', pri ? '오케이, 이건 특별히 별표 쳐서 기억해둘게! 내일 아침에 1순위로 말해줄게 ⭐' : '오케이, 기억해둘게! 내일 아침에 꼭 말해줄게 🐥');
    setTimeout(()=>addNote((pri?'⭐':'📝')+' 코코가 기억함: "'+task.text+'"'), 400);
    return;
  }
  if(/불안|걱정|무서|떨려|긴장|스트레스/.test(text)){
    const topic = cleanTask(text.replace(/(때문에|이|가)? ?(너무 )?(불안|걱정|무서|떨려|긴장|스트레스).*$/,'').trim()) || text;
    const ex = state.worries.find(x=>topic.includes(x.text) || x.text.includes(topic));
    if(ex){ ex.count++; persist();
      addBubble('coco','그 얘기 또 하는 거 보니 진짜 마음에 걸리나 보다… 괜찮아, 내가 계속 옆에서 챙길게. 내일 아침에도 물어볼게 🫂');
    } else { state.worries.push({ text:topic, count:1, date:todayStr() }); persist();
      addBubble('coco','에고, 그것 때문에 마음이 무겁구나… 얘기해줘서 고마워. 너무 혼자 끙끙대지 마!');
    }
    return;
  }
  if(/피곤|힘들|지쳐|우울/.test(text)){ addBubble('coco','에고… 고생 많았어. 오늘은 좀 쉬엄쉬엄 하자 🫂'); return; }
  if(/안녕|하이|헬로|굿모닝|좋은 아침/.test(text)){ addBubble('coco','안녕안녕~! 오늘 컨디션 어때?'); return; }
  addBubble('coco', pick(['오 그래? 더 얘기해 줘!','음음, 듣고 있어! 뭐 계획 있으면 말만 해 🐥']));
}

function cleanTask(t){
  return t.replace(/^(나 |내일 |오늘 |이따 )/,'')
          .replace(/(해야 ?돼|해야 ?해|해야지|하기로 했어|할 ?거야|하려고|할래)[.!~ㅋㅎ]*$/,'')
          .trim() || t;
}
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function openDrawer(){

    cb.onchange = ()=>{ t.done = cb.checked; persist(); openDrawer(); };
    const span = document.createElement('span');

}
function openPersonaDrawer(){
  const list = document.getElementById('personaList');
  list.innerHTML = '';
  Object.entries(PERSONAS).forEach(([id,p])=>{
    const item = document.createElement('div');
    item.className = 'p-item' + (state.persona===id ? ' sel' : '');
    item.innerHTML = '<span class="p-emoji">'+p.emoji+'</span><div><b>'+p.name+'</b><div class="p-desc">'+p.desc+'</div></div>';
    item.onclick = ()=>selectPersona(id);
    list.appendChild(item);
  });
  document.getElementById('personaDrawer').classList.add('open');
}
function closePersonaDrawer(){ document.getElementById('personaDrawer').classList.remove('open'); }

// ---------- 항상 듣기: "코코야" 하고 부르면 대답 ----------
let alwaysOn = false, wakeRec = null, wakeLock = null;
function toggleWake(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ addBubble('coco','이 브라우저는 항상 듣기가 안 되네… 크롬에서 열어줘!', false); return; }
  alwaysOn = !alwaysOn;
  document.getElementById('wakeBtn').textContent = alwaysOn ? '👂✨' : '👂';
  if(alwaysOn){
    startWakeLoop();
    keepAwake();
    addNote('👂 항상 듣기 ON — "'+P().name+'야~" 하고 불러봐! (화면도 안 꺼지게 유지할게)');
  } else {
    if(wakeRec) try{ wakeRec.stop(); }catch(e){}
    if(wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
    addNote('👂 항상 듣기 OFF');
  }
}
function startWakeLoop(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  wakeRec = new SR();
  wakeRec.lang = 'ko-KR'; wakeRec.continuous = true; wakeRec.interimResults = false;
  wakeRec.onresult = e => {
    const t = e.results[e.results.length-1][0].transcript.trim();
    const names = [P().name, '코코'];
    const hit = names.find(n => t.includes(n));
    if(!hit) return;
    const after = t.slice(t.indexOf(hit) + hit.length).replace(/^[야아님씨,!~ ]+/, '').trim();
    if(after){ // "코코야 나 오늘 발표 있어" → 바로 전송
      document.getElementById('msg').value = after; send();
    } else { // 부르기만 하면 대답
      addBubble('coco', pick(['응, 불렀어? 말해!', '왜왜, 여기 있어!', '응! 듣고 있어~']));
    }
  };
  wakeRec.onend = () => { if(alwaysOn){ try{ wakeRec.start(); }catch(e){} } }; // 끊기면 자동 재시작
  wakeRec.onerror = () => {};
  try{ wakeRec.start(); }catch(e){}
}
function keepAwake(){ // 화면 꺼짐 방지 (탁상 모드)
  if('wakeLock' in navigator){
    navigator.wakeLock.request('screen').then(l => wakeLock = l).catch(()=>{});
  }
}
document.addEventListener('visibilitychange', ()=>{ // 다시 돌아오면 유지 재요청
  if(!document.hidden && alwaysOn) keepAwake();
});

// ---------- 시간 체크인: 설정한 시간마다 먼저 말 걸기 ----------
let lastFired = '';
setInterval(()=>{
  if(!state.checkins.length) return;
  const now = new Date();
  const hm = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const key = todayStr() + hm;
  if(state.checkins.includes(hm) && lastFired !== key){
    lastFired = key;
    fireCheckin(hm);
  }
}, 20000);

function fireCheckin(hm){
  addDateChip('⏰ ' + hm + ' 체크인');
  showTyping();
  askCoco('checkin')
    .then(out => { hideTyping(); applyResult(out); notifyIfHidden(out.reply); })
    .catch(e => { hideTyping(); apiErrorNote(e); notifyIfHidden(checkinLocal(hm)); });
}
function checkinLocal(hm){
  const pending = state.tasks.filter(t=>!t.done);
  let msg;
  if(pending.length){
    const top = pending.find(t=>t.priority) || pending[0];
    msg = USER+'야 지금 뭐 해? 누워 있으면 일어나 봐 ㅋㅋ 벌써 '+hm+'인데 "'+top.text+'" 했어? 아직이면 지금 딱 5분만 시작해보자!';
  } else {
    msg = USER+'야 뭐 해~ '+hm+' 체크인! 오늘 할 일 다 끝났던데? 역시 대단해 😎';
  }
  addBubble('coco', msg);
  return msg;
}
function notifyIfHidden(text){ // 다른 앱 보는 중이면 알림으로
  if(document.hidden && 'Notification' in window && Notification.permission === 'granted'){
    new Notification(P().name, { body: String(text).slice(0,120), icon: '/icon-192.png' });
  }
}
function openCheckinDrawer(){
  renderCheckins();
  if('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  document.getElementById('checkinDrawer').classList.add('open');
}
function closeCheckinDrawer(){ document.getElementById('checkinDrawer').classList.remove('open'); }
function renderCheckins(){
  const list = document.getElementById('checkinList');
  list.innerHTML = '';
  if(!state.checkins.length){ list.innerHTML = '<div class="empty">아직 설정한 시간이 없어. 아래에서 추가해봐!</div>'; return; }
  state.checkins.slice().sort().forEach(hm=>{
    const item = document.createElement('div');
    item.className = 'task-item';
    item.innerHTML = '<span>⏰ '+hm+'</span>';
    const del = document.createElement('button');
    del.className = 'icon-btn'; del.textContent = '삭제'; del.style.marginLeft = 'auto';
    del.onclick = ()=>{ state.checkins = state.checkins.filter(x=>x!==hm); persist(); renderCheckins(); };
    item.appendChild(del);
    list.appendChild(item);
  });
}
function addCheckin(){
  const v = document.getElementById('newTime').value;
  if(!v || state.checkins.includes(v)) return;
  state.checkins.push(v); persist(); renderCheckins();
}
function selectPersona(id){
  if(state.persona !== id){
    state.persona = id; persist();
    applyPersonaHeader();
    addNote('🎭 이제 '+P().name+'와(과) 대화 중 — 기억(할 일·걱정)은 그대로 이어져요');
    addBubble('coco', INTROS[id] || '안녕!');
  }
  closePersonaDrawer();
}

// ---------- 시작 ----------
applyPersonaHeader();
voiceOn = !!state.voiceOn;
document.getElementById('voiceBtn').textContent = voiceOn ? '🔊' : '🔇';
if('speechSynthesis' in window) speechSynthesis.getVoices(); // 목소리 목록 미리 로드
if(state.lastVisit !== todayStr() || !state.chat.length){
  state.lastVisit = todayStr(); state.chat = []; persist();
  morningGreeting();
} else {
  addDateChip(prettyDate(todayStr()));
  state.chat.forEach(m => m.who==='note' ? addNote(m.text,false) : addBubble(m.who, m.text, false));
}
</script>
